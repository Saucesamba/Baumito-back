version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: campus_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: campus_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - campus_network

  redis:
    image: redis:7-alpine
    container_name: campus_redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - campus_network

  minio:
    image: minio/minio
    container_name: campus_minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - campus_network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: campus_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - campus_network

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: campus_kafka
    depends_on:
      - zookeeper
    environment:
      # ПРАВИЛЬНЫЕ ПЕРЕМЕННЫЕ ДЛЯ CONFLUENT:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    networks:
      - campus_network


  app:
    build:
      context: ../
      dockerfile: deployments/Dockerfile
      args:
        SERVICE_PATH: cmd/app
    container_name: campus_app
    depends_on:
      - db
      - redis
      - minio
      - kafka
    ports:
      - "8080:8080"
    environment:
      APP_PORT: 8080
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: user
      DB_PASSWORD: password
      DB_NAME: campus_db
      REDIS_HOST: redis:6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      KAFKA_BROKERS: kafka:9092
    networks:
      - campus_network
      
  notifications:
    build:
      context: ../
      dockerfile: deployments/Dockerfile
      args:
        SERVICE_PATH: cmd/notifications # Путь к мейну уведомлений
    container_name: campus_notifications
    depends_on:
      - kafka
    environment:
      - KAFKA_BROKERS=kafka:9092
    networks:
      - campus_network

networks:
  campus_network:
    driver: bridge

volumes:
  postgres_data:
  minio_data: